<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الرفع - الإدارات</title>
    
    <!-- تم تغيير سيرفر مكتبة التشفير إلى سيرفر أقوى وموثوق ليتوافق مع جميع الهواتف -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #2a2a2a; padding: 20px; border-radius: 8px; border-top: 4px solid #d4af37; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 15px; background: #d4af37; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius:4px; font-size:16px; color:#1a1a1a;}
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #555; padding: 5px; text-align: center; }
        th { background-color: #444; color: #d4af37; }
        .support { text-align: center; margin-top: 30px; font-size: 12px; color: #888; }
        .support a { color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="container" id="login-container">
        <h2 style="text-align: center; color:#d4af37;">بوابة المندوبين</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">تسجيل الدخول</button>
        <div id="status" style="text-align:center; margin-top:10px; color:#e74c3c;"></div>
    </div>

    <!-- شاشة تعبئة الموقف -->
    <div class="container" id="report-container" style="display:none;">
        <h2 style="color:#d4af37;">تعبئة الموقف اليومي</h2>
        
        <label>المهام والمنجزات:</label>
        <textarea id="missions" rows="4"></textarea>
        
        <label>التحركات والزيارات:</label>
        <textarea id="movements" rows="3"></textarea>
        
        <label>الخسائر البشرية:</label>
        <table id="humanTable">
            <thead><tr><th>الرقم العسكري</th><th>الرتبة</th><th>الرتبة المستحقة</th><th>الإسم</th><th>الوحدة</th><th>تاريخ الإصابة</th><th>المكان</th><th>سبب الإصابة</th><th>نوع الإصابة</th><th>المحافظة</th><th>المديرية</th><th>القرية</th><th>الحالة</th><th>حذف</th></tr></thead>
            <tbody></tbody>
        </table>
        <button style="background:#4CAF50; padding:5px; width:auto; color:white;" onclick="addRow('humanTable')">+ إضافة خسارة بشرية</button>

        <label style="display:block; margin-top:15px;">الخسائر المادية:</label>
        <table id="materialTable">
            <thead><tr><th>النوع</th><th>موديل</th><th>الرقم</th><th>نوع التدمير</th><th>نوع العطل</th><th>السبب</th><th>الوحدة</th><th>المكان</th><th>التاريخ</th><th>ملاحظات</th><th>حذف</th></tr></thead>
            <tbody></tbody>
        </table>
        <button style="background:#3498db; padding:5px; width:auto; color:white;" onclick="addRow('materialTable')">+ إضافة خسارة مادية</button>

        <button onclick="sendReport()" id="sendBtn">تشفير وإرسال للقيادة</button>
        <div id="send-status" style="text-align:center; margin-top:10px;"></div>
    </div>

    <!-- تذييل الدعم الفني -->
    <div class="support">الدعم الفني والتقني:<br><a href="https://wa.me/967772914419" target="_blank">967772914419</a></div>

    <script>
        // ⚠️ ضع الرابط الخاص بك بين علامتي التنصيص أدناه ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwXrjPyVzj_z-wIHEYEbhaKRb2wTxbZoNwF5Uw9OkbOA0r_XALUlnYD6Vm0a9Mq9Cy0/exec"; 
        
        const KEY ="Marib_Cipher_2026"
        let userFullname = "";

        async function login() {
            document.getElementById('status').innerText = "جاري التحقق...";
            try {
                const res = await fetch(`${GAS_URL}?action=login&username=${document.getElementById('username').value}&password=${document.getElementById('password').value}`);
                const data = await res.json();
                if(data.status === "success" && data.role === "sender") {
                    userFullname = data.fullName;
                    document.getElementById('login-container').style.display = "none";
                    document.getElementById('report-container').style.display = "block";
                } else { 
                    document.getElementById('status').innerText = "بيانات غير صحيحة أو لا تملك صلاحية مرسل."; 
                }
            } catch(e) {
                document.getElementById('status').innerText = "خطأ في الاتصال. تأكد من إدخال رابط جوجل الصحيح في الكود.";
            }
        }

        function addRow(tableId) {
            const table = document.getElementById(tableId).getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            const colCount = document.getElementById(tableId).rows[0].cells.length;
            for(let i=0; i<colCount-1; i++) newRow.insertCell(i).innerHTML = '<input type="text" style="width:90%; padding:2px; background:#444; color:white; border:1px solid #666;">';
            newRow.insertCell(colCount-1).innerHTML = '<button onclick="this.parentNode.parentNode.remove()" style="background:#e74c3c; padding:4px; margin:0; border-radius:3px; color:white;">X</button>';
        }

        function getTableData(tableId) {
            let data = [];
            const rows = document.getElementById(tableId).getElementsByTagName('tbody')[0].rows;
            for (let i = 0; i < rows.length; i++) {
                let rowData = [];
                const inputs = rows[i].getElementsByTagName('input');
                for (let j = 0; j < inputs.length; j++) rowData.push(inputs[j].value);
                data.push(rowData);
            }
            return data;
        }

        async function sendReport() {
            const btn = document.getElementById('sendBtn');
            const statusDiv = document.getElementById('send-status');
            
            // تحقق سريع للتأكد من أن المكتبة تم تحميلها بنجاح قبل العمل
            if (typeof CryptoJS === 'undefined') {
                statusDiv.innerHTML = "<span style='color:#e74c3c; font-weight:bold;'>الإنترنت ضعيف جداً ولم يتمكن من تحميل مكتبة التشفير. يرجى تحديث الصفحة والمحاولة.</span>";
                return;
            }

            btn.innerText = "جاري التشفير والرفع...";
            btn.disabled = true;
            btn.style.opacity = "0.7";
            statusDiv.innerHTML = "";

            try {
                const reportData = {
                    date: new Date().toISOString(),
                    missions: document.getElementById('missions').value,
                    movements: document.getElementById('movements').value,
                    humanLosses: getTableData('humanTable'),
                    materialLosses: getTableData('materialTable')
                };

                const encrypted = CryptoJS.AES.encrypt(JSON.stringify(reportData), KEY).toString();
                
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "send_report", fullName: userFullname, encryptedPayload: encrypted }) 
                });

                statusDiv.innerHTML = "<span style='color:#25D366; font-weight:bold;'>تم إرسال الموقف بنجاح!</span>";
                
                document.querySelectorAll('textarea').forEach(t => t.value=''); 
                document.querySelectorAll('tbody').forEach(b => b.innerHTML='');
                
            } catch(e) {
                statusDiv.innerHTML = "<span style='color:#e74c3c; font-weight:bold;'>تفاصيل الخطأ: " + e.message + "</span>";
            } finally {
                btn.innerText = "تشفير وإرسال للقيادة";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
